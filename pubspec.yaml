name: speech_kit
description: >-
  Native Dart bindings for Apple Speech (SpeechAnalyzer, SpeechTranscriber,
  AssetInventory) using Dart Build Hooks.
version: 0.0.1
repository: https://github.com/blendfactory/speech-kit
documentation: https://github.com/blendfactory/speech-kit#readme
issue_tracker: https://github.com/blendfactory/speech-kit/issues

environment:
  sdk: ^3.10.0

platforms:
  ios:
  macos:

topics:
  - speech
  - speech-recognition
  - ios
  - macos
  - ffi

dependencies:
  code_assets: ^1.0.0
  ffi: ^2.2.0
  hooks: ^1.0.2
  meta: ^1.18.1
  native_toolchain_c: ^0.17.5

dev_dependencies:
  mocktail: ^1.0.4
  test: ^1.30.0
